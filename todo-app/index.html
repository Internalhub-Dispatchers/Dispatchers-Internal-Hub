<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatcher To-Do List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #3498db;
            --secondary-color: #2ecc71;
            --danger-color: #e74c3c;
            --warning-color: #f39c12;
            --dark-color: #2c3e50;
            --light-color: #ecf0f1;
            --text-color: #34495e;
            --border-color: #bdc3c7;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-color);
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .todo-wrapper {
            background: white;
            border-radius: 15px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.9;
        }

        .input-section {
            padding: 20px;
            border-bottom: 2px solid var(--light-color);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .todo-input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        .todo-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .add-btn {
            padding: 12px 20px;
            background: linear-gradient(135deg, var(--secondary-color) 0%, #27ae60 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3);
        }

        .add-btn:active {
            transform: translateY(0);
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid var(--border-color);
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
            color: var(--text-color);
        }

        .filter-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .filter-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 15px 20px;
            background: var(--light-color);
        }

        .stat-item {
            text-align: center;
            padding: 10px;
        }

        .stat-label {
            display: block;
            font-size: 12px;
            color: var(--text-color);
            margin-bottom: 5px;
        }

        .stat-value {
            display: block;
            font-size: 22px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .todo-list-container {
            padding: 20px;
            min-height: 200px;
        }

        .todo-list {
            list-style: none;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: var(--light-color);
            border-radius: 8px;
            margin-bottom: 10px;
            animation: fadeIn 0.3s ease;
            transition: all 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .todo-item:hover {
            background: #e8f4f8;
            transform: translateX(5px);
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #95a5a6;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .todo-text {
            flex: 1;
            font-size: 15px;
            word-break: break-word;
            transition: all 0.3s ease;
        }

        .todo-priority {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            margin-left: auto;
            flex-shrink: 0;
        }

        .priority-high {
            background: #ffebee;
            color: var(--danger-color);
        }

        .priority-medium {
            background: #fff3e0;
            color: var(--warning-color);
        }

        .priority-low {
            background: #e8f5e9;
            color: var(--secondary-color);
        }

        .delete-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--danger-color);
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .delete-btn:hover {
            background: #c0392b;
            transform: scale(1.1);
        }

        .delete-btn:active {
            transform: scale(0.95);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #95a5a6;
            display: none;
        }

        .empty-state.show {
            display: block;
        }

        .empty-state p {
            font-size: 16px;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 20px;
            border-top: 2px solid var(--light-color);
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            text-align: center;
        }

        .btn-secondary {
            background: var(--primary-color);
            color: white;
        }

        .btn-secondary:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: var(--danger-color);
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 24px;
            }

            .input-group {
                flex-direction: column;
            }

            .add-btn {
                width: 100%;
            }

            .stats {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .action-buttons {
                grid-template-columns: 1fr;
            }

            .todo-item {
                padding: 12px;
            }

            .todo-priority {
                display: none;
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="todo-wrapper">
            <div class="header">
                <h1>📋 Dispatcher To-Do List</h1>
                <p class="subtitle">Keep track of your tasks</p>
            </div>

            <div class="input-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="todoInput" 
                        class="todo-input" 
                        placeholder="Add a new task..."
                        autocomplete="off"
                    >
                    <button id="addBtn" class="add-btn">
                        <span>➕ Add</span>
                    </button>
                </div>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">Total:</span>
                    <span class="stat-value" id="totalCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Active:</span>
                    <span class="stat-value" id="activeCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Completed:</span>
                    <span class="stat-value" id="completedCount">0</span>
                </div>
            </div>

            <div class="todo-list-container">
                <ul id="todoList" class="todo-list"></ul>
                <div id="emptyState" class="empty-state">
                    <p>✨ No tasks yet. Add one to get started!</p>
                </div>
            </div>

            <div class="action-buttons">
                <button id="clearCompleted" class="btn btn-secondary">
                    🗑️ Clear Completed
                </button>
                <button id="clearAll" class="btn btn-danger">
                    🔥 Clear All
                </button>
            </div>
        </div>
    </div>

    <script>
        // To-Do List Application with Local Storage
        class TodoApp {
            constructor() {
                this.todoInput = document.getElementById('todoInput');
                this.addBtn = document.getElementById('addBtn');
                this.todoList = document.getElementById('todoList');
                this.emptyState = document.getElementById('emptyState');
                this.filterButtons = document.querySelectorAll('.filter-btn');
                this.clearCompletedBtn = document.getElementById('clearCompleted');
                this.clearAllBtn = document.getElementById('clearAll');
                this.totalCount = document.getElementById('totalCount');
                this.activeCount = document.getElementById('activeCount');
                this.completedCount = document.getElementById('completedCount');

                this.storageKey = 'dispatcher_todos';
                this.currentFilter = 'all';

                this.init();
            }

            init() {
                this.loadFromStorage();
                this.bindEvents();
                this.render();
            }

            bindEvents() {
                this.addBtn.addEventListener('click', () => this.addTodo());
                this.todoInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.addTodo();
                });

                this.filterButtons.forEach(btn => {
                    btn.addEventListener('click', () => this.setFilter(btn.dataset.filter));
                });

                this.clearCompletedBtn.addEventListener('click', () => this.clearCompleted());
                this.clearAllBtn.addEventListener('click', () => this.clearAll());
            }

            addTodo() {
                const text = this.todoInput.value.trim();

                if (!text) {
                    this.shakeElement(this.todoInput);
                    return;
                }

                if (text.length > 150) {
                    alert('Task must be 150 characters or less!');
                    return;
                }

                const todo = {
                    id: Date.now(),
                    text: text,
                    completed: false,
                    priority: 'medium',
                    createdAt: new Date().toLocaleString()
                };

                this.todos.push(todo);
                this.saveToStorage();
                this.render();
                this.todoInput.value = '';
                this.todoInput.focus();
            }

            deleteTodo(id) {
                if (confirm('Are you sure you want to delete this task?')) {
                    this.todos = this.todos.filter(todo => todo.id !== id);
                    this.saveToStorage();
                    this.render();
                }
            }

            toggleTodo(id) {
                const todo = this.todos.find(t => t.id === id);
                if (todo) {
                    todo.completed = !todo.completed;
                    this.saveToStorage();
                    this.render();
                }
            }

            setFilter(filter) {
                this.currentFilter = filter;
                
                this.filterButtons.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.filter === filter);
                });

                this.render();
            }

            getFilteredTodos() {
                switch (this.currentFilter) {
                    case 'active':
                        return this.todos.filter(todo => !todo.completed);
                    case 'completed':
                        return this.todos.filter(todo => todo.completed);
                    case 'all':
                    default:
                        return this.todos;
                }
            }

            clearCompleted() {
                const completedCount = this.todos.filter(t => t.completed).length;
                
                if (completedCount === 0) {
                    alert('No completed tasks to clear!');
                    return;
                }

                if (confirm(`Clear ${completedCount} completed task(s)?`)) {
                    this.todos = this.todos.filter(todo => !todo.completed);
                    this.saveToStorage();
                    this.render();
                }
            }

            clearAll() {
                if (this.todos.length === 0) {
                    alert('No tasks to clear!');
                    return;
                }

                if (confirm('Are you sure you want to delete ALL tasks? This cannot be undone!')) {
                    this.todos = [];
                    this.saveToStorage();
                    this.render();
                }
            }

            updateStats() {
                const total = this.todos.length;
                const completed = this.todos.filter(t => t.completed).length;
                const active = total - completed;

                this.totalCount.textContent = total;
                this.activeCount.textContent = active;
                this.completedCount.textContent = completed;
            }

            render() {
                const filteredTodos = this.getFilteredTodos();

                this.updateStats();

                this.todoList.innerHTML = '';

                if (filteredTodos.length === 0) {
                    this.emptyState.classList.add('show');
                } else {
                    this.emptyState.classList.remove('show');
                }

                filteredTodos.forEach(todo => {
                    const li = document.createElement('li');
                    li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                    li.innerHTML = `
                        <input 
                            type="checkbox" 
                            class="checkbox" 
                            ${todo.completed ? 'checked' : ''}
                            onchange="app.toggleTodo(${todo.id})"
                        >
                        <span class="todo-text">${this.escapeHtml(todo.text)}</span>
                        <span class="todo-priority priority-${todo.priority}">${todo.priority}</span>
                        <button class="delete-btn" onclick="app.deleteTodo(${todo.id})">🗑️</button>
                    `;
                    this.todoList.appendChild(li);
                });
            }

            saveToStorage() {
                try {
                    localStorage.setItem(this.storageKey, JSON.stringify(this.todos));
                } catch (error) {
                    console.error('Failed to save to localStorage:', error);
                    alert('Failed to save your tasks. Please check your browser storage.');
                }
            }

            loadFromStorage() {
                try {
                    const stored = localStorage.getItem(this.storageKey);
                    this.todos = stored ? JSON.parse(stored) : [];
                } catch (error) {
                    console.error('Failed to load from localStorage:', error);
                    this.todos = [];
                }
            }

            escapeHtml(text) {
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                };
                return text.replace(/[&<>"']/g, m => map[m]);
            }

            shakeElement(element) {
                element.classList.add('shake');
                setTimeout(() => element.classList.remove('shake'), 300);
            }
        }

        let app;
        document.addEventListener('DOMContentLoaded', () => {
            app = new TodoApp();
        });
    </script>
</body>
</html>
